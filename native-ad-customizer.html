<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Native Ad Template 樣式調整器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: linear-gradient(145deg, #f7f7f8 0%, #eef0f2 100%); min-height: 100vh; }
#root { font-family: 'Noto Sans TC', system-ui, sans-serif; color: #1a1a1a; max-width: 560px; width: 100%; margin: 0 auto; min-height: 100vh; background: #fff; }
@media (min-width: 700px) {
  #root { max-width: 960px; }
  .desktop-two-col { display: flex; gap: 24px; align-items: flex-start; }
  .desktop-two-col .col-preview { flex: 1; position: sticky; top: 20px; }
  .desktop-two-col .col-params { flex: 1; min-width: 0; }
}

/* Collapsible sections */
.collapsible { border-radius: 8px; border: 1px solid #eee; background: #f7f8fa; margin-bottom: 10px; overflow: hidden; }
.collapsible-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border: none; background: transparent; cursor: pointer; text-align: left; font-family: inherit; }
.collapsible-btn .title { font-size: 12px; font-weight: 600; color: #333; }
.collapsible-btn .arrow { font-size: 11px; color: #bbb; transition: transform 0.15s; }
.collapsible-btn .arrow.open { transform: rotate(90deg); }
.collapsible-body { padding: 0 14px 12px; display: none; }
.collapsible-body.open { display: block; }

/* Template selector */
.tmpl-btn { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; cursor: pointer; text-align: left; font-family: inherit; }
.tmpl-btn.active { border: 2px solid #2962FF; background: #EEF2FF; }
.tmpl-btn .name { font-size: 13px; font-weight: 600; color: #333; }
.tmpl-btn.active .name { color: #2962FF; }
.tmpl-btn .desc { font-size: 10px; color: #888; margin-top: 2px; }

/* Toggle chip */
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 16px; border: 1.5px solid #d0d0d0; background: #f5f5f5; color: #999; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.chip.active { border-color: #2962FF; background: #EEF2FF; color: #2962FF; }
.chip.required { cursor: default; }
.chip .badge { font-size: 9px; background: #E8F5E9; color: #2E7D32; padding: 1px 4px; border-radius: 3px; font-weight: 600; }

/* Image upload */
.img-upload { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.img-upload .label-col { min-width: 90px; }
.img-upload .label-col .main { font-size: 12px; font-weight: 500; color: #333; }
.img-upload .label-col .hint { font-size: 10px; color: #999; }
.upload-btn { font-size: 11px; color: #2962FF; background: #EEF2FF; border: 1px solid #dce3f0; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-family: inherit; }
.remove-btn { font-size: 10px; color: #e53935; background: none; border: 1px solid #ffcdd2; border-radius: 4px; padding: 3px 8px; cursor: pointer; font-family: inherit; }
.replace-btn { font-size: 10px; color: #2962FF; background: none; border: 1px solid #bbdefb; border-radius: 4px; padding: 3px 8px; cursor: pointer; font-family: inherit; }
.thumb { height: 36px; border-radius: 4px; border: 1px solid #ddd; object-fit: cover; }

/* Preview area */
.preview-area { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: repeating-conic-gradient(#f0f0f0 0% 25%, #fafafa 0% 50%) 50%/20px 20px; border-bottom: 1px solid #eee; }
.preview-label { font-size: 10px; color: #999; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.hidden-badge { background: #FFF3E0; color: #E65100; padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: 600; }

/* Export bar */
.export-bar { display: flex; gap: 8px; padding: 10px 20px; border-bottom: 1px solid #eee; align-items: center; }
.export-bar .btn-png { flex: 1; padding: 10px; background: #2962FF; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.export-bar .btn-json { flex: 1; padding: 10px; background: #fff; color: #333; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.export-bar .btn-json.copied { background: #E8F5E9; color: #2E7D32; border-color: #A5D6A7; }
.export-bar .btn-link { flex: 1; padding: 10px; background: #fff; color: #333; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.export-bar .btn-link.copied { background: #E8F5E9; color: #2E7D32; border-color: #A5D6A7; }
.export-bar .btn-reset { padding: 10px 14px; background: #fff; color: #999; border: 1px solid #eee; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
.export-msg { padding: 8px 20px; background: #E8F5E9; color: #2E7D32; font-size: 12px; font-weight: 500; text-align: center; display: none; }

/* Param groups */
.param-header { font-size: 11px; color: #999; letter-spacing: 1px; text-transform: uppercase; padding: 12px 20px 6px; }
.param-group { border-bottom: 1px solid #f0f0f0; transition: opacity 0.15s; }
.param-group.hidden-field { opacity: 0.4; }
.param-group-btn { width: 100%; display: flex; align-items: center; gap: 8px; padding: 10px 20px; border: none; background: transparent; cursor: pointer; text-align: left; font-family: inherit; }
.param-group-btn.expanded { background: #fafafa; }
.param-group.hidden-field .param-group-btn { cursor: default; }
.param-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: #f0f0f0; color: #666; border-radius: 6px; font-size: 11px; font-weight: 700; font-family: system-ui; flex-shrink: 0; }
.param-icon.highlight { background: #FF6B35; color: #fff; }
.param-group-label { flex: 1; font-size: 13px; font-weight: 500; color: #333; }
.param-group.hidden-field .param-group-label { color: #bbb; }
.param-group-label .hid-tag { font-size: 10px; color: #ccc; margin-left: 6px; }
.param-arrow { font-size: 12px; color: #ccc; transition: transform 0.15s; }
.param-arrow.open { transform: rotate(90deg); }
.param-body { padding: 4px 20px 14px 56px; display: none; }
.param-body.open { display: block; }
.param-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; }
.param-row label { font-size: 12px; color: #555; min-width: 56px; flex-shrink: 0; }
.color-input { display: flex; align-items: center; gap: 6px; }
.color-input input[type=color] { width: 32px; height: 28px; border: 1px solid #d0d0d0; border-radius: 4px; padding: 0; cursor: pointer; }
.color-input input[type=text] { width: 90px; font-size: 12px; font-family: monospace; padding: 4px 6px; border: 1px solid #d0d0d0; border-radius: 4px; background: #fafafa; }
.param-row select { font-size: 12px; padding: 4px 6px; border: 1px solid #d0d0d0; border-radius: 4px; background: #fafafa; min-width: 130px; font-family: inherit; }
.param-row .range-wrap { display: flex; align-items: center; gap: 6px; }
.param-row .range-wrap input[type=range] { width: 80px; }
.param-row .range-wrap span { font-size: 12px; font-family: monospace; color: #666; min-width: 24px; }
.param-row input[type=text] { font-size: 12px; padding: 4px 6px; border: 1px solid #d0d0d0; border-radius: 4px; background: #fafafa; min-width: 160px; flex: 1; }
.text-with-counter { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.text-with-counter input[type=text] { min-width: 0; }
.char-counter { font-size: 10px; font-family: monospace; white-space: nowrap; flex-shrink: 0; }

/* Preview template cards */
.ad-card { border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.media-placeholder { display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; background: linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%); }
.media-placeholder .ph-text { color: #999; font-size: 11px; font-family: system-ui; text-align: center; line-height: 1.4; white-space: pre-line; }
.media-placeholder .lock-badge { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.45); color: #fff; font-size: 8px; padding: 1px 5px; border-radius: 2px; font-family: system-ui; }

/* Doc links */
.doc-links { padding: 14px 20px; background: #f8f9fa; border-top: 1px solid #eee; }
.doc-links .heading { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 8px; }
.doc-links .links { display: flex; gap: 8px; flex-wrap: wrap; }
.doc-links a { font-size: 11px; color: #2962FF; text-decoration: none; padding: 4px 10px; background: #EEF2FF; border-radius: 4px; border: 1px solid #dce3f0; }
</style>
</head>
<body>
<div id="root"></div>

<script>
(function() {
  "use strict";

  /* ── Constants ── */
  var TEMPLATES = {
    medium: { label: "Medium", description: "半頁至 3/4 頁視圖，適合 feed 或 landing page" },
    small: { label: "Small", description: "長條矩形，適合 recycler view / in-feed" }
  };

  var DEFAULT_STYLES = {
    mainBackgroundColor: "#FFFFFF",
    primaryTextContent: "廣告標題文字範例",
    primaryTextTypeface: "Noto Sans TC",
    primaryTextSize: 16,
    primaryTextTypefaceColor: "#1A1A1A",
    primaryTextBackgroundColor: "transparent",
    secondaryTextContent: "廣告主名稱",
    secondaryTextTypeface: "Noto Sans TC",
    secondaryTextSize: 13,
    secondaryTextTypefaceColor: "#666666",
    secondaryTextBackgroundColor: "transparent",
    tertiaryTextContent: "這是廣告描述文字，說明產品或服務的特色與優勢，吸引使用者點擊了解更多。",
    tertiaryTextTypeface: "Noto Sans TC",
    tertiaryTextSize: 13,
    tertiaryTextTypefaceColor: "#444444",
    tertiaryTextBackgroundColor: "transparent",
    ctaText: "瞭解詳情",
    ctaTextTypeface: "Noto Sans TC",
    ctaTextSize: 14,
    ctaTypefaceColor: "#FFFFFF",
    ctaBackgroundColor: "#4285F4"
  };

  var TEXT_LIMITS = {
    primaryTextContent:   { suggest: 25, max: 90 },
    tertiaryTextContent:  { suggest: 90, max: 150 },
    secondaryTextContent: { suggest: 25, max: 25 },
    ctaText:              { suggest: 15, max: 15 }
  };

  var URL_PARAM_MAP = {
    t: "template",
    bg: "mainBackgroundColor",
    pt: "primaryTextContent", ptf: "primaryTextTypeface", pts: "primaryTextSize",
    ptc: "primaryTextTypefaceColor", ptb: "primaryTextBackgroundColor",
    st: "secondaryTextContent", stf: "secondaryTextTypeface", sts: "secondaryTextSize",
    stc: "secondaryTextTypefaceColor", stb: "secondaryTextBackgroundColor",
    tt: "tertiaryTextContent", ttf: "tertiaryTextTypeface", tts: "tertiaryTextSize",
    ttc: "tertiaryTextTypefaceColor", ttb: "tertiaryTextBackgroundColor",
    cta: "ctaText", ctaf: "ctaTextTypeface", ctas: "ctaTextSize",
    ctac: "ctaTypefaceColor", ctab: "ctaBackgroundColor"
  };
  var URL_COLOR_KEYS = ["bg","ptc","ptb","stc","stb","ttc","ttb","ctac","ctab"];
  var URL_NUMBER_KEYS = ["pts","sts","tts","ctas"];

  var FONT_OPTIONS = ["Noto Sans TC", "Roboto", "Arial", "Helvetica", "Georgia", "Courier New", "system-ui"];
  var OPTIONAL_FIELDS = [
    { key: "body", label: "描述文字 (Body)" },
    { key: "advertiserName", label: "廣告主名稱" },
    { key: "advertiserIcon", label: "廣告主 Icon" }
  ];
  var PARAM_GROUPS = [
    { key: "main", label: "整體背景", icon: "◻", params: [{ key: "mainBackgroundColor", label: "背景色", type: "color" }] },
    { key: "primary", label: "標題 (Primary Text)", icon: "H1", params: [
      { key: "primaryTextContent", label: "預覽文字", type: "text" },
      { key: "primaryTextTypeface", label: "字體", type: "font" },
      { key: "primaryTextSize", label: "字級", type: "number", min: 10, max: 32 },
      { key: "primaryTextTypefaceColor", label: "文字色", type: "color" },
      { key: "primaryTextBackgroundColor", label: "背景色", type: "color" }
    ]},
    { key: "secondary", label: "廣告主名稱 (Secondary)", icon: "H2", optionalFieldKey: "advertiserName", params: [
      { key: "secondaryTextContent", label: "預覽文字", type: "text" },
      { key: "secondaryTextTypeface", label: "字體", type: "font" },
      { key: "secondaryTextSize", label: "字級", type: "number", min: 8, max: 24 },
      { key: "secondaryTextTypefaceColor", label: "文字色", type: "color" },
      { key: "secondaryTextBackgroundColor", label: "背景色", type: "color" }
    ]},
    { key: "tertiary", label: "描述文字 (Tertiary)", icon: "¶", optionalFieldKey: "body", params: [
      { key: "tertiaryTextContent", label: "預覽文字", type: "text" },
      { key: "tertiaryTextTypeface", label: "字體", type: "font" },
      { key: "tertiaryTextSize", label: "字級", type: "number", min: 8, max: 24 },
      { key: "tertiaryTextTypefaceColor", label: "文字色", type: "color" },
      { key: "tertiaryTextBackgroundColor", label: "背景色", type: "color" }
    ]},
    { key: "cta", label: "CTA 按鈕", icon: "▶", params: [
      { key: "ctaText", label: "按鈕文字", type: "text" },
      { key: "ctaTextTypeface", label: "字體", type: "font" },
      { key: "ctaTextSize", label: "字級", type: "number", min: 10, max: 24 },
      { key: "ctaTypefaceColor", label: "文字色", type: "color" },
      { key: "ctaBackgroundColor", label: "背景色", type: "color" }
    ]}
  ];

  var DOC_LINKS = [
    { l: "📄 Template (Android)", u: "https://developers.google.com/ad-manager/mobile-ads-sdk/android/native/templates" },
    { l: "📄 Template (iOS)", u: "https://developers.google.com/ad-manager/mobile-ads-sdk/ios/native/templates" },
    { l: "📄 Custom Rendering", u: "https://developers.google.com/ad-manager/mobile-ads-sdk/android/native/advanced" },
    { l: "📄 Native + Banner", u: "https://developers.google.com/ad-manager/mobile-ads-sdk/android/native-banner" }
  ];

  /* ── State ── */
  var state = {
    template: "medium",
    styles: Object.assign({}, DEFAULT_STYLES),
    highlightZone: null,
    expandedGroup: "primary",
    visibility: { body: true, advertiserName: true, advertiserIcon: true },
    mediaUrl: null,
    iconUrl: null,
    jsonCopied: false,
    linkCopied: false,
    exportMsg: null,
    collapsible: {} // track open/close of info sections
  };

  /* ── Helpers ── */
  function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  /* ── Render ── */
  function render() {
    var s = state.styles;
    var v = state.visibility;
    var hz = state.highlightZone;
    var t = state.template;
    var hasHidden = !v.body || !v.advertiserName || !v.advertiserIcon;

    var html = '';

    /* Header */
    html += '<div style="padding:20px;border-bottom:1px solid #e0e0e0;background:rgba(255,255,255,0.95)">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
    html += '<div style="font-size:17px;font-weight:700">Google Native Ad Template 樣式調整器</div>';
    html += '<a href="index.html" style="font-size:12px;color:#2962FF;text-decoration:none;padding:4px 10px;background:#EEF2FF;border-radius:4px;border:1px solid #dce3f0;white-space:nowrap">← 工具目錄</a>';
    html += '</div>';
    html += '<div style="font-size:12px;color:#555;line-height:1.7;margin-bottom:14px">';
    html += 'App 廣告版位在 <strong>App Render（Native）</strong> 模式下，GAM 回傳結構化資料，由 App 自行組裝畫面。<br/>';
    html += '本工具基於 Google 官方 Native Template，讓設計師即時調整樣式、預覽效果、匯出 PNG 貼到 Figma 確認。';
    html += '</div>';

    /* Collapsible: 可調整 vs 不可調整 */
    var c1Open = state.collapsible["info1"];
    html += '<div class="collapsible"><button class="collapsible-btn" data-collapsible="info1">';
    html += '<span class="title">可調整 vs 不可調整</span>';
    html += '<span class="arrow' + (c1Open ? ' open' : '') + '">▶</span></button>';
    html += '<div class="collapsible-body' + (c1Open ? ' open' : '') + '">';
    html += '<div style="display:flex;gap:20px;flex-wrap:wrap">';
    html += '<div style="flex:1;min-width:140px">';
    html += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px">';
    html += '<div style="width:12px;height:12px;border:2px solid #FF6B35;border-radius:2px"></div>';
    html += '<span style="font-size:11px;font-weight:600;color:#FF6B35">可調整（樣式）</span></div>';
    html += '<ul style="margin:0;padding-left:18px;font-size:11px;color:#555;line-height:1.8"><li>整體背景色</li><li>標題 — 字體、字級、字色、背景色</li><li>廣告主名稱 — 同上</li><li>描述文字 — 同上</li><li>CTA 按鈕 — 同上</li></ul></div>';
    html += '<div style="flex:1;min-width:140px">';
    html += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px">';
    html += '<div style="width:12px;height:12px;background:#e0e0e0;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px">🔒</div>';
    html += '<span style="font-size:11px;font-weight:600;color:#999">不可調整（結構）</span></div>';
    html += '<ul style="margin:0;padding-left:18px;font-size:11px;color:#999;line-height:1.8"><li>Media / Image 區域</li><li>Icon 位置</li><li>AdChoices 標記</li><li>元素排列順序</li></ul></div></div>';
    html += '<div style="margin-top:10px;padding:8px 10px;background:#FFF8E1;border-radius:4px;font-size:11px;color:#8D6E00;line-height:1.6">';
    html += '⚠ 若需更改結構或排列，需走 Custom Rendering（非 Template）路線，開發成本較高。</div>';
    html += '</div></div>';

    /* Collapsible: GAM 回傳欄位說明 */
    var c2Open = state.collapsible["info2"];
    html += '<div class="collapsible"><button class="collapsible-btn" data-collapsible="info2">';
    html += '<span class="title">GAM 回傳欄位說明</span>';
    html += '<span class="arrow' + (c2Open ? ' open' : '') + '">▶</span></button>';
    html += '<div class="collapsible-body' + (c2Open ? ' open' : '') + '">';
    html += '<div style="font-size:11px;color:#444;line-height:1.7">';
    html += '<strong>必填欄位</strong>（一定會有）：標題 (Headline)、主圖 (Image)、CTA 按鈕<br/>';
    html += '<strong>選填欄位</strong>（可能為空）：描述文字 (Body)、廣告主名稱 / Icon、Star rating<br/>';
    html += '<span style="color:#888">→ 設計稿以全部欄位都有的狀態設計，另需標注「欄位為空時的處理方式」</span><br/>';
    html += '<span style="color:#888">→ 下方「欄位模擬」可切換選填欄位，預覽各種缺失狀態</span><br/><br/>';
    html += '<strong>各欄位文字長度限制</strong>（由 GAM 投放端控制，App 端不需驗證）：<br/>';
    html += '標題 建議25字/上限90字、描述文字 建議90字/上限150字、廣告主名稱 上限25字、CTA按鈕 上限15字</div>';
    html += '</div></div></div>';

    /* Template selector */
    html += '<div style="display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid #eee">';
    ["medium", "small"].forEach(function(k) {
      var active = t === k;
      html += '<button class="tmpl-btn' + (active ? ' active' : '') + '" data-template="' + k + '">';
      html += '<div class="name">' + TEMPLATES[k].label + '</div>';
      html += '<div class="desc">' + esc(TEMPLATES[k].description) + '</div></button>';
    });
    html += '</div>';

    /* Image uploads */
    html += '<div style="padding:10px 20px;border-bottom:1px solid #eee">';
    html += '<div style="font-size:11px;font-weight:600;color:#555;margin-bottom:6px">素材上傳（模擬真實廣告畫面）</div>';
    html += renderImageUpload("media", "主圖 Media", "不限尺寸，建議 1.91:1 或 1:1，≥1200px寬", state.mediaUrl, "wide", "image/jpeg,image/png,image/gif,image/webp");
    html += renderImageUpload("icon", "Icon 圖示", "不限尺寸，建議 1:1 正方形，≥128px", state.iconUrl, "square", "image/jpeg,image/png");
    html += '</div>';

    /* Field toggles */
    html += '<div style="padding:12px 20px;border-bottom:1px solid #eee">';
    html += '<div style="font-size:11px;font-weight:600;color:#555;margin-bottom:8px;display:flex;align-items:center;gap:6px">';
    html += '<span>欄位模擬</span>';
    html += '<span style="font-size:9px;color:#888;font-weight:400;background:#f5f5f5;padding:2px 6px;border-radius:3px">切換選填欄位，模擬 GAM 未提供該資料時的畫面</span></div>';
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';

  /* ── Event binding ── */
  function bindEvents() {
    var root = document.getElementById("root");

    // Collapsible sections
    root.querySelectorAll("[data-collapsible]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var key = btn.getAttribute("data-collapsible");
        state.collapsible[key] = !state.collapsible[key];
        render();
      });
    });

    // Template selector
    root.querySelectorAll("[data-template]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        state.template = btn.getAttribute("data-template");
        render();
      });
    });

    // Toggle chips
    root.querySelectorAll("[data-toggle]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var k = btn.getAttribute("data-toggle");
        state.visibility[k] = !state.visibility[k];
        render();
      });
    });

    // Image uploads
    root.querySelectorAll("[data-img-upload]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var id = btn.getAttribute("data-img-upload");
        root.querySelector('[data-img-input="' + id + '"]').click();
      });
    });
    root.querySelectorAll("[data-img-replace]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var id = btn.getAttribute("data-img-replace");
        root.querySelector('[data-img-input="' + id + '"]').click();
      });
    });
    root.querySelectorAll("[data-img-clear]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var id = btn.getAttribute("data-img-clear");
        if (id === "media") { if (state.mediaUrl) URL.revokeObjectURL(state.mediaUrl); state.mediaUrl = null; }
        else { if (state.iconUrl) URL.revokeObjectURL(state.iconUrl); state.iconUrl = null; }
        render();
      });
    });
    root.querySelectorAll("[data-img-input]").forEach(function(inp) {
      inp.addEventListener("change", function(e) {
        var f = e.target.files && e.target.files[0];
        if (!f) return;
        var id = inp.getAttribute("data-img-input");
        var reader = new FileReader();
        reader.onload = function(ev) {
          if (id === "media") { state.mediaUrl = ev.target.result; }
          else { state.iconUrl = ev.target.result; }
          render();
        };
        reader.readAsDataURL(f);
        e.target.value = "";
      });
    });

    // Param group expand
    root.querySelectorAll("[data-expand]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var key = btn.getAttribute("data-expand");
        var grp = btn.closest(".param-group");
        if (grp && grp.classList.contains("hidden-field")) return;
        state.expandedGroup = state.expandedGroup === key ? null : key;
        render();
      });
    });

    // Param group hover
    root.querySelectorAll(".param-group").forEach(function(el) {
      el.addEventListener("mouseenter", function() {
        if (el.classList.contains("hidden-field")) return;
        state.highlightZone = el.getAttribute("data-group");
        updatePreview();
        updateParamIcons();
      });
      el.addEventListener("mouseleave", function() {
        state.highlightZone = null;
        updatePreview();
        updateParamIcons();
      });
    });

    // Style inputs — color picker
    root.querySelectorAll('[data-input="color-picker"]').forEach(function(inp) {
      inp.addEventListener("input", function() {
        var key = inp.getAttribute("data-style");
        state.styles[key] = inp.value;
        var textInp = root.querySelector('[data-input="color-text"][data-style="' + key + '"]');
        if (textInp) textInp.value = inp.value;
        updatePreview();
      });
    });
    // Color text
    root.querySelectorAll('[data-input="color-text"]').forEach(function(inp) {
      inp.addEventListener("input", function() {
        var key = inp.getAttribute("data-style");
        state.styles[key] = inp.value;
        var picker = root.querySelector('[data-input="color-picker"][data-style="' + key + '"]');
        if (picker && inp.value.match(/^#[0-9a-fA-F]{6}$/)) picker.value = inp.value;
        updatePreview();
      });
    });
    // Font select
    root.querySelectorAll("select[data-style]").forEach(function(sel) {
      sel.addEventListener("change", function() {
        state.styles[sel.getAttribute("data-style")] = sel.value;
        updatePreview();
      });
    });
    // Range slider
    root.querySelectorAll('[data-input="range"]').forEach(function(inp) {
      inp.addEventListener("input", function() {
        var key = inp.getAttribute("data-style");
        state.styles[key] = Number(inp.value);
        var span = inp.parentNode.querySelector("span");
        if (span) span.textContent = inp.value;
        updatePreview();
      });
    });
    // Text field
    root.querySelectorAll('[data-input="text-field"]').forEach(function(inp) {
      inp.addEventListener("input", function() {
        state.styles[inp.getAttribute("data-style")] = inp.value;
        updatePreview();
      });
    });

    // Export PNG
    var btnPng = document.getElementById("btn-export-png");
    if (btnPng) btnPng.addEventListener("click", exportPNG);

    // Export JSON
    var btnJson = document.getElementById("btn-export-json");
    if (btnJson) btnJson.addEventListener("click", exportJSON);

    // Export Link
    var btnLink = document.getElementById("btn-export-link");
    if (btnLink) btnLink.addEventListener("click", exportLink);

    // Reset
    var btnReset = document.getElementById("btn-reset");
    if (btnReset) btnReset.addEventListener("click", resetAll);
  }

  /* ── Partial updates for performance ── */
  function updatePreview() {
    var wrap = document.getElementById("preview-wrap");
    if (!wrap) return;
    wrap.innerHTML = (state.template === "medium") ? renderMedium() : renderSmall();
  }

  function updateParamIcons() {
    document.querySelectorAll(".param-icon").forEach(function(el) {
      var grp = el.closest(".param-group");
      if (!grp) return;
      var key = grp.getAttribute("data-group");
      var isHid = grp.classList.contains("hidden-field");
      if (state.highlightZone === key && !isHid) {
        el.classList.add("highlight");
      } else {
        el.classList.remove("highlight");
      }
    });
  }

  /* ── Actions ── */
  function resetAll() {
    if (state.mediaUrl) URL.revokeObjectURL(state.mediaUrl);
    if (state.iconUrl) URL.revokeObjectURL(state.iconUrl);
    state.styles = Object.assign({}, DEFAULT_STYLES);
    state.visibility = { body: true, advertiserName: true, advertiserIcon: true };
    state.mediaUrl = null;
    state.iconUrl = null;
    state.exportMsg = null;
    state.jsonCopied = false;
    state.linkCopied = false;
    render();
  }

  function exportJSON() {
    var s = state.styles;
    var d = {
      template: state.template,
      optionalFieldsVisible: Object.assign({}, state.visibility),
      nativeTemplateStyle: {
        mainBackgroundColor: s.mainBackgroundColor,
        primaryText: { typeface: s.primaryTextTypeface, size: s.primaryTextSize, typefaceColor: s.primaryTextTypefaceColor, backgroundColor: s.primaryTextBackgroundColor },
        secondaryText: { typeface: s.secondaryTextTypeface, size: s.secondaryTextSize, typefaceColor: s.secondaryTextTypefaceColor, backgroundColor: s.secondaryTextBackgroundColor },
        tertiaryText: { typeface: s.tertiaryTextTypeface, size: s.tertiaryTextSize, typefaceColor: s.tertiaryTextTypefaceColor, backgroundColor: s.tertiaryTextBackgroundColor },
        callToAction: { text: s.ctaText, typeface: s.ctaTextTypeface, size: s.ctaTextSize, typefaceColor: s.ctaTypefaceColor, backgroundColor: s.ctaBackgroundColor }
      }
    };
    var json = JSON.stringify(d, null, 2);
    var onSuccess = function() {
      state.jsonCopied = true;
      var btn = document.getElementById("btn-export-json");
      if (btn) { btn.textContent = "✓ 已複製"; btn.classList.add("copied"); }
      setTimeout(function() {
        state.jsonCopied = false;
        var btn2 = document.getElementById("btn-export-json");
        if (btn2) { btn2.textContent = "📋 複製 JSON"; btn2.classList.remove("copied"); }
      }, 2000);
    };
    navigator.clipboard.writeText(json).then(onSuccess).catch(function() {
      var ta = document.createElement("textarea");
      ta.value = json; ta.style.position = "fixed"; ta.style.left = "-9999px";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      onSuccess();
    });
  }

  function showExportMsg(msg, duration) {
    state.exportMsg = msg;
    var el = document.getElementById("export-msg");
    if (el) { el.textContent = msg; el.style.display = "block"; }
    setTimeout(function() {
      state.exportMsg = null;
      var el2 = document.getElementById("export-msg");
      if (el2) el2.style.display = "none";
    }, duration || 3000);
  }

  function exportPNG() {
    var el = document.getElementById("preview-wrap");
    if (!el) return;
    html2canvas(el, { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(function(canvas) {
      var a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = "native-ad-" + state.template + "-template.png";
      a.click();
      showExportMsg("✓ PNG 已下載，拖入 Figma 即可使用", 3000);
    }).catch(function() {
      showExportMsg("⚠ 匯出失敗，請使用截圖工具", 3000);
    });
  }

  /* ── Share link ── */
  function exportLink() {
    var s = state.styles;
    var parts = [];
    // Reverse map: style key → short key
    var reverseMap = {};
    for (var short in URL_PARAM_MAP) { reverseMap[URL_PARAM_MAP[short]] = short; }

    // template
    parts.push("t=" + encodeURIComponent(state.template));

    // style params
    for (var styleKey in s) {
      var sk = reverseMap[styleKey];
      if (!sk) continue;
      var val = s[styleKey];
      // Skip if same as default
      if (val === DEFAULT_STYLES[styleKey]) continue;
      if (URL_COLOR_KEYS.indexOf(sk) !== -1) {
        // Strip # from color values
        var cv = String(val).replace(/^#/, "");
        parts.push(sk + "=" + encodeURIComponent(cv));
      } else if (URL_NUMBER_KEYS.indexOf(sk) !== -1) {
        parts.push(sk + "=" + val);
      } else {
        parts.push(sk + "=" + encodeURIComponent(val));
      }
    }

    // visibility toggles
    if (!state.visibility.body) parts.push("vb=0");
    if (!state.visibility.advertiserName) parts.push("vn=0");
    if (!state.visibility.advertiserIcon) parts.push("vi=0");

    var baseUrl = location.href.split("?")[0];
    var url = baseUrl + "?" + parts.join("&");

    var onSuccess = function() {
      state.linkCopied = true;
      var btn = document.getElementById("btn-export-link");
      if (btn) { btn.textContent = "✓ 已複製連結"; btn.classList.add("copied"); }
      setTimeout(function() {
        state.linkCopied = false;
        var btn2 = document.getElementById("btn-export-link");
        if (btn2) { btn2.textContent = "🔗 產生連結"; btn2.classList.remove("copied"); }
      }, 2000);
    };
    navigator.clipboard.writeText(url).then(onSuccess).catch(function() {
      var ta = document.createElement("textarea");
      ta.value = url; ta.style.position = "fixed"; ta.style.left = "-9999px";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      onSuccess();
    });
  }

  function parseUrlParams() {
    var search = location.search;
    if (!search || search.length < 2) return;
    var params = {};
    search.substring(1).split("&").forEach(function(pair) {
      var kv = pair.split("=");
      if (kv.length === 2) params[kv[0]] = decodeURIComponent(kv[1]);
    });

    // template
    if (params.t === "medium" || params.t === "small") state.template = params.t;

    // style params
    for (var short in URL_PARAM_MAP) {
      if (short === "t") continue;
      if (!(short in params)) continue;
      var styleKey = URL_PARAM_MAP[short];
      var val = params[short];
      if (URL_COLOR_KEYS.indexOf(short) !== -1) {
        // Add # back, handle "transparent"
        val = (val === "transparent") ? "transparent" : "#" + val;
      } else if (URL_NUMBER_KEYS.indexOf(short) !== -1) {
        val = Number(val);
        if (isNaN(val)) continue;
      }
      state.styles[styleKey] = val;
    }

    // visibility
    if (params.vb === "0") state.visibility.body = false;
    if (params.vn === "0") state.visibility.advertiserName = false;
    if (params.vi === "0") state.visibility.advertiserIcon = false;
  }

  /* ── Init ── */
  parseUrlParams();
  render();
})();
</script>
</body>
</html>
