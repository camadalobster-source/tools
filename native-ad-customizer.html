<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Native Ad Template 樣式調整器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: linear-gradient(145deg, #f7f7f8 0%, #eef0f2 100%); min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback } = React;

const TEMPLATES = {
  medium: { label: "Medium", description: "半頁至 3/4 頁視圖，適合 feed 或 landing page" },
  small: { label: "Small", description: "長條矩形，適合 recycler view / in-feed" },
};

const DEFAULT_STYLES = {
  mainBackgroundColor: "#FFFFFF",
  primaryTextContent: "廣告標題文字範例",
  primaryTextTypeface: "Noto Sans TC",
  primaryTextSize: 16,
  primaryTextTypefaceColor: "#1A1A1A",
  primaryTextBackgroundColor: "transparent",
  secondaryTextContent: "廣告主名稱",
  secondaryTextTypeface: "Noto Sans TC",
  secondaryTextSize: 13,
  secondaryTextTypefaceColor: "#666666",
  secondaryTextBackgroundColor: "transparent",
  tertiaryTextContent: "這是廣告描述文字，說明產品或服務的特色與優勢，吸引使用者點擊了解更多。",
  tertiaryTextTypeface: "Noto Sans TC",
  tertiaryTextSize: 13,
  tertiaryTextTypefaceColor: "#444444",
  tertiaryTextBackgroundColor: "transparent",
  ctaText: "瞭解詳情",
  ctaTextTypeface: "Noto Sans TC",
  ctaTextSize: 14,
  ctaTypefaceColor: "#FFFFFF",
  ctaBackgroundColor: "#4285F4",
};

const FONT_OPTIONS = ["Noto Sans TC", "Roboto", "Arial", "Helvetica", "Georgia", "Courier New", "system-ui"];
const OPTIONAL_FIELDS = [
  { key: "body", label: "描述文字 (Body)" },
  { key: "advertiserName", label: "廣告主名稱" },
  { key: "advertiserIcon", label: "廣告主 Icon" },
];
const PARAM_GROUPS = [
  { key: "main", label: "整體背景", icon: "◻", params: [{ key: "mainBackgroundColor", label: "背景色", type: "color" }] },
  { key: "primary", label: "標題 (Primary Text)", icon: "H1", params: [
    { key: "primaryTextContent", label: "預覽文字", type: "text" },
    { key: "primaryTextTypeface", label: "字體", type: "font" },
    { key: "primaryTextSize", label: "字級", type: "number", min: 10, max: 32 },
    { key: "primaryTextTypefaceColor", label: "文字色", type: "color" },
    { key: "primaryTextBackgroundColor", label: "背景色", type: "color" },
  ]},
  { key: "secondary", label: "廣告主名稱 (Secondary)", icon: "H2", optionalFieldKey: "advertiserName", params: [
    { key: "secondaryTextContent", label: "預覽文字", type: "text" },
    { key: "secondaryTextTypeface", label: "字體", type: "font" },
    { key: "secondaryTextSize", label: "字級", type: "number", min: 8, max: 24 },
    { key: "secondaryTextTypefaceColor", label: "文字色", type: "color" },
    { key: "secondaryTextBackgroundColor", label: "背景色", type: "color" },
  ]},
  { key: "tertiary", label: "描述文字 (Tertiary)", icon: "¶", optionalFieldKey: "body", params: [
    { key: "tertiaryTextContent", label: "預覽文字", type: "text" },
    { key: "tertiaryTextTypeface", label: "字體", type: "font" },
    { key: "tertiaryTextSize", label: "字級", type: "number", min: 8, max: 24 },
    { key: "tertiaryTextTypefaceColor", label: "文字色", type: "color" },
    { key: "tertiaryTextBackgroundColor", label: "背景色", type: "color" },
  ]},
  { key: "cta", label: "CTA 按鈕", icon: "▶", params: [
    { key: "ctaText", label: "按鈕文字", type: "text" },
    { key: "ctaTextTypeface", label: "字體", type: "font" },
    { key: "ctaTextSize", label: "字級", type: "number", min: 10, max: 24 },
    { key: "ctaTypefaceColor", label: "文字色", type: "color" },
    { key: "ctaBackgroundColor", label: "背景色", type: "color" },
  ]},
];

function ColorInput({ value, onChange }) {
  const t = value === "transparent";
  return React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
    React.createElement("input", { type: "color", value: t ? "#ffffff" : value, onChange: e => onChange(e.target.value),
      style: { width: 32, height: 28, border: "1px solid #d0d0d0", borderRadius: 4, padding: 0, cursor: "pointer",
        background: t ? "repeating-conic-gradient(#ccc 0% 25%, white 0% 50%) 50%/12px 12px" : value } }),
    React.createElement("input", { type: "text", value, onChange: e => onChange(e.target.value),
      style: { width: 90, fontSize: 12, fontFamily: "monospace", padding: "4px 6px", border: "1px solid #d0d0d0", borderRadius: 4, background: "#fafafa" } })
  );
}

function ToggleChip({ label, active, onClick, required }) {
  return (
    <button onClick={required ? undefined : onClick}
      style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "5px 10px", borderRadius: 16,
        border: active ? "1.5px solid #2962FF" : "1.5px solid #d0d0d0",
        background: active ? "#EEF2FF" : "#f5f5f5", color: active ? "#2962FF" : "#999",
        fontSize: 11, fontWeight: 500, cursor: required ? "default" : "pointer", transition: "all 0.15s" }}>
      <span style={{ fontSize: 13 }}>{active ? "☑" : "☐"}</span>
      {label}
      {required && <span style={{ fontSize: 9, background: "#E8F5E9", color: "#2E7D32", padding: "1px 4px", borderRadius: 3, fontWeight: 600 }}>必填</span>}
    </button>
  );
}

function CollapsibleSection({ title, defaultOpen, children }) {
  const [open, setOpen] = useState(defaultOpen || false);
  return (
    <div style={{ borderRadius: 8, border: "1px solid #eee", background: "#f7f8fa", marginBottom: 10, overflow: "hidden" }}>
      <button onClick={() => setOpen(!open)}
        style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "10px 14px", border: "none", background: "transparent", cursor: "pointer", textAlign: "left" }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: "#333" }}>{title}</span>
        <span style={{ fontSize: 11, color: "#bbb", transform: open ? "rotate(90deg)" : "none", transition: "transform 0.15s" }}>▶</span>
      </button>
      {open && <div style={{ padding: "0 14px 12px" }}>{children}</div>}
    </div>
  );
}

function ImageUpload({ label, hint, currentUrl, onUpload, onClear, accept, aspectHint }) {
  const ref = useRef(null);
  const handleFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (currentUrl) URL.revokeObjectURL(currentUrl);
    onUpload(URL.createObjectURL(f));
    e.target.value = "";
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0" }}>
      <div style={{ minWidth: 90 }}>
        <div style={{ fontSize: 12, fontWeight: 500, color: "#333" }}>{label}</div>
        <div style={{ fontSize: 10, color: "#999" }}>{hint}</div>
      </div>
      {currentUrl ? (
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <img src={currentUrl} style={{ height: 36, borderRadius: 4, border: "1px solid #ddd", objectFit: "cover",
            width: aspectHint === "square" ? 36 : 64 }} />
          <button onClick={() => { if (currentUrl) URL.revokeObjectURL(currentUrl); onClear(); }}
            style={{ fontSize: 10, color: "#e53935", background: "none", border: "1px solid #ffcdd2", borderRadius: 4, padding: "3px 8px", cursor: "pointer" }}>
            移除
          </button>
          <button onClick={() => ref.current && ref.current.click()}
            style={{ fontSize: 10, color: "#2962FF", background: "none", border: "1px solid #bbdefb", borderRadius: 4, padding: "3px 8px", cursor: "pointer" }}>
            替換
          </button>
        </div>
      ) : (
        <button onClick={() => ref.current && ref.current.click()}
          style={{ fontSize: 11, color: "#2962FF", background: "#EEF2FF", border: "1px solid #dce3f0", borderRadius: 4, padding: "5px 12px", cursor: "pointer" }}>
          上傳圖片
        </button>
      )}
      <input ref={ref} type="file" accept={accept} onChange={handleFile} style={{ display: "none" }} />
    </div>
  );
}

function MediaPlaceholder({ width, height, label }) {
  return (
    <div style={{ width, height, background: "linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%)",
      display: "flex", alignItems: "center", justifyContent: "center", position: "relative", flexShrink: 0 }}>
      <div style={{ color: "#999", fontSize: 11, fontFamily: "system-ui", textAlign: "center", lineHeight: 1.4, whiteSpace: "pre-line" }}>{label}</div>
      <div style={{ position: "absolute", top: 4, left: 4, background: "rgba(0,0,0,0.45)", color: "#fff",
        fontSize: 8, padding: "1px 5px", borderRadius: 2, fontFamily: "system-ui" }}>🔒 不可調整</div>
    </div>
  );
}

function MediumTemplate({ styles, highlightZone, visibility, mediaUrl, iconUrl }) {
  const showIcon = visibility.advertiserIcon;
  const showSecondary = visibility.advertiserName;
  const showTertiary = visibility.body;
  return (
    <div style={{ width: 320, backgroundColor: styles.mainBackgroundColor, borderRadius: 8, overflow: "hidden",
      border: "1px solid #e0e0e0", boxShadow: "0 2px 12px rgba(0,0,0,0.08)",
      outline: highlightZone === "main" ? "3px solid #FF6B35" : "none" }}>
      {mediaUrl ? (
        <img src={mediaUrl} style={{ width: "100%", height: 180, objectFit: "cover", display: "block" }} />
      ) : (
        <MediaPlaceholder width="100%" height={180} label={"▶ Media / Image\n320 × 180"} />
      )}
      <div style={{ padding: 12 }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
          {showIcon && (
            iconUrl ? (
              <img src={iconUrl} style={{ width: 40, height: 40, borderRadius: 20, objectFit: "cover", flexShrink: 0 }} />
            ) : (
              <div style={{ width: 40, height: 40, borderRadius: 20, background: "#e0e0e0", flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: "#999", fontFamily: "system-ui", position: "relative" }}>
                icon
                <div style={{ position: "absolute", top: -4, right: -4, background: "rgba(0,0,0,0.5)", color: "#fff", fontSize: 7, padding: "1px 3px", borderRadius: 2, fontFamily: "system-ui" }}>🔒</div>
              </div>
            )
          )}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontFamily: styles.primaryTextTypeface, fontSize: styles.primaryTextSize,
              color: styles.primaryTextTypefaceColor, backgroundColor: styles.primaryTextBackgroundColor,
              fontWeight: 600, lineHeight: 1.3, outline: highlightZone === "primary" ? "2px solid #FF6B35" : "none",
              outlineOffset: 2, borderRadius: 2, overflow: "hidden", textOverflow: "ellipsis",
              display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
              {styles.primaryTextContent}
            </div>
            {showSecondary && (
              <div style={{ fontFamily: styles.secondaryTextTypeface, fontSize: styles.secondaryTextSize,
                color: styles.secondaryTextTypefaceColor, backgroundColor: styles.secondaryTextBackgroundColor,
                marginTop: 2, outline: highlightZone === "secondary" ? "2px solid #FF6B35" : "none", outlineOffset: 2, borderRadius: 2 }}>
                {styles.secondaryTextContent}
              </div>
            )}
          </div>
        </div>
        {showTertiary && (
          <div style={{ fontFamily: styles.tertiaryTextTypeface, fontSize: styles.tertiaryTextSize,
            color: styles.tertiaryTextTypefaceColor, backgroundColor: styles.tertiaryTextBackgroundColor,
            lineHeight: 1.5, marginBottom: 10, outline: highlightZone === "tertiary" ? "2px solid #FF6B35" : "none",
            outlineOffset: 2, borderRadius: 2, overflow: "hidden", textOverflow: "ellipsis",
            display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
            {styles.tertiaryTextContent}
          </div>
        )}
        <div style={{ fontFamily: styles.ctaTextTypeface, fontSize: styles.ctaTextSize, color: styles.ctaTypefaceColor,
          backgroundColor: styles.ctaBackgroundColor, padding: "8px 16px", borderRadius: 4, textAlign: "center",
          fontWeight: 500, outline: highlightZone === "cta" ? "2px solid #FF6B35" : "none", outlineOffset: 2, marginTop: showTertiary ? 0 : 10 }}>
          {styles.ctaText}
        </div>
      </div>
      <div style={{ padding: "0 12px 8px", display: "flex", alignItems: "center", gap: 4 }}>
        <span style={{ fontSize: 9, color: "#999", background: "#f0f0f0", padding: "1px 4px", borderRadius: 2, fontFamily: "system-ui" }}>Ad</span>
        <span style={{ fontSize: 9, color: "#bbb", fontFamily: "system-ui" }}>AdChoices ▸ 🔒</span>
      </div>
    </div>
  );
}

function SmallTemplate({ styles, highlightZone, visibility, mediaUrl, iconUrl }) {
  const showIcon = visibility.advertiserIcon;
  const showSecondary = visibility.advertiserName;
  const showTertiary = visibility.body;
  return (
    <div style={{ width: 320, backgroundColor: styles.mainBackgroundColor, borderRadius: 8, overflow: "hidden",
      border: "1px solid #e0e0e0", boxShadow: "0 2px 12px rgba(0,0,0,0.08)", display: "flex",
      outline: highlightZone === "main" ? "3px solid #FF6B35" : "none" }}>
      {showIcon && (
        iconUrl ? (
          <img src={iconUrl} style={{ width: 85, objectFit: "cover", flexShrink: 0 }} />
        ) : (
          <MediaPlaceholder width={85} height="auto" label={"icon /\nmedia"} />
        )
      )}
      <div style={{ flex: 1, padding: 10, display: "flex", flexDirection: "column", justifyContent: "center", gap: 4, minWidth: 0 }}>
        <div style={{ fontFamily: styles.primaryTextTypeface, fontSize: Math.min(styles.primaryTextSize, 15),
          color: styles.primaryTextTypefaceColor, backgroundColor: styles.primaryTextBackgroundColor,
          fontWeight: 600, lineHeight: 1.3, outline: highlightZone === "primary" ? "2px solid #FF6B35" : "none",
          outlineOffset: 1, borderRadius: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {styles.primaryTextContent}
        </div>
        {showSecondary && (
          <div style={{ fontFamily: styles.secondaryTextTypeface, fontSize: Math.min(styles.secondaryTextSize, 12),
            color: styles.secondaryTextTypefaceColor, backgroundColor: styles.secondaryTextBackgroundColor,
            outline: highlightZone === "secondary" ? "2px solid #FF6B35" : "none", outlineOffset: 1, borderRadius: 2,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
            {styles.secondaryTextContent}
          </div>
        )}
        {showTertiary && (
          <div style={{ fontFamily: styles.tertiaryTextTypeface, fontSize: Math.min(styles.tertiaryTextSize, 11),
            color: styles.tertiaryTextTypefaceColor, backgroundColor: styles.tertiaryTextBackgroundColor,
            outline: highlightZone === "tertiary" ? "2px solid #FF6B35" : "none", outlineOffset: 1, borderRadius: 2,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
            {styles.tertiaryTextContent}
          </div>
        )}
        <div style={{ fontFamily: styles.ctaTextTypeface, fontSize: Math.min(styles.ctaTextSize, 12),
          color: styles.ctaTypefaceColor, backgroundColor: styles.ctaBackgroundColor, padding: "4px 10px",
          borderRadius: 4, textAlign: "center", fontWeight: 500,
          outline: highlightZone === "cta" ? "2px solid #FF6B35" : "none", outlineOffset: 1, alignSelf: "flex-start" }}>
          {styles.ctaText}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [template, setTemplate] = useState("medium");
  const [styles, setStyles] = useState({ ...DEFAULT_STYLES });
  const [highlightZone, setHighlightZone] = useState(null);
  const [expandedGroup, setExpandedGroup] = useState("primary");
  const [exportMsg, setExportMsg] = useState(null);
  const [visibility, setVisibility] = useState({ body: true, advertiserName: true, advertiserIcon: true });
  const [mediaUrl, setMediaUrl] = useState(null);
  const [iconUrl, setIconUrl] = useState(null);
  const [jsonCopied, setJsonCopied] = useState(false);
  const previewRef = useRef(null);

  const updateStyle = useCallback((key, value) => { setStyles(p => ({ ...p, [key]: value })); }, []);
  const resetAll = useCallback(() => {
    setStyles({ ...DEFAULT_STYLES });
    setVisibility({ body: true, advertiserName: true, advertiserIcon: true });
    if (mediaUrl) URL.revokeObjectURL(mediaUrl);
    if (iconUrl) URL.revokeObjectURL(iconUrl);
    setMediaUrl(null); setIconUrl(null); setExportMsg(null); setJsonCopied(false);
  }, [mediaUrl, iconUrl]);
  const toggleVis = useCallback((k) => { setVisibility(p => ({ ...p, [k]: !p[k] })); }, []);

  const exportJSON = useCallback(() => {
    const d = {
      template, optionalFieldsVisible: { ...visibility },
      nativeTemplateStyle: {
        mainBackgroundColor: styles.mainBackgroundColor,
        primaryText: { typeface: styles.primaryTextTypeface, size: styles.primaryTextSize, typefaceColor: styles.primaryTextTypefaceColor, backgroundColor: styles.primaryTextBackgroundColor },
        secondaryText: { typeface: styles.secondaryTextTypeface, size: styles.secondaryTextSize, typefaceColor: styles.secondaryTextTypefaceColor, backgroundColor: styles.secondaryTextBackgroundColor },
        tertiaryText: { typeface: styles.tertiaryTextTypeface, size: styles.tertiaryTextSize, typefaceColor: styles.tertiaryTextTypefaceColor, backgroundColor: styles.tertiaryTextBackgroundColor },
        callToAction: { text: styles.ctaText, typeface: styles.ctaTextTypeface, size: styles.ctaTextSize, typefaceColor: styles.ctaTypefaceColor, backgroundColor: styles.ctaBackgroundColor },
      },
    };
    const json = JSON.stringify(d, null, 2);
    navigator.clipboard.writeText(json).then(() => {
      setJsonCopied(true); setTimeout(() => setJsonCopied(false), 2000);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = json; ta.style.position = "fixed"; ta.style.left = "-9999px";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      setJsonCopied(true); setTimeout(() => setJsonCopied(false), 2000);
    });
  }, [styles, template, visibility]);

  const exportPNG = useCallback(async () => {
    const el = previewRef.current;
    if (!el) return;
    try {
      const canvas = document.createElement("canvas");
      const s = 2, r = el.getBoundingClientRect();
      canvas.width = r.width * s; canvas.height = r.height * s;
      const ctx = canvas.getContext("2d"); ctx.scale(s, s);
      ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      const clone = el.cloneNode(true);
      const wrapper = document.createElement("div");
      wrapper.style.position = "fixed"; wrapper.style.left = "-9999px"; wrapper.style.top = "0"; wrapper.style.width = r.width + "px";
      document.body.appendChild(wrapper); wrapper.appendChild(clone);
      const xmlns = "http://www.w3.org/1999/xhtml";
      const html = new XMLSerializer().serializeToString(clone);
      document.body.removeChild(wrapper);
      const svgStr = '<svg xmlns="http://www.w3.org/2000/svg" width="'+r.width+'" height="'+r.height+'"><foreignObject width="100%" height="100%"><div xmlns="'+xmlns+'" style="font-family:Noto Sans TC,system-ui,sans-serif;">'+html+'</div></foreignObject></svg>';
      const svgBlob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0); URL.revokeObjectURL(url);
        const a = document.createElement("a"); a.href = canvas.toDataURL("image/png");
        a.download = "native-ad-" + template + "-template.png"; a.click();
        setExportMsg("✓ PNG 已下載，拖入 Figma 即可使用"); setTimeout(() => setExportMsg(null), 3000);
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        const svgDl = document.createElement("a"); svgDl.href = URL.createObjectURL(svgBlob);
        svgDl.download = "native-ad-" + template + "-template.svg"; svgDl.click();
        setExportMsg("✓ SVG 已下載（PNG 轉換失敗，SVG 同樣可拖入 Figma）"); setTimeout(() => setExportMsg(null), 4000);
      };
      img.src = url;
    } catch (e) { setExportMsg("⚠ 匯出失敗，請使用截圖工具"); setTimeout(() => setExportMsg(null), 3000); }
  }, [template]);

  const Tmpl = template === "medium" ? MediumTemplate : SmallTemplate;
  const hasHidden = !visibility.body || !visibility.advertiserName || !visibility.advertiserIcon;

  return (
    <div style={{ fontFamily: "'Noto Sans TC', system-ui, sans-serif", color: "#1a1a1a", maxWidth: 480, margin: "0 auto", minHeight: "100vh", background: "#fff" }}>

      {/* Header */}
      <div style={{ padding: "20px", borderBottom: "1px solid #e0e0e0", background: "rgba(255,255,255,0.95)" }}>
        <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 4 }}>Google Native Ad Template 樣式調整器</div>
        <div style={{ fontSize: 12, color: "#555", lineHeight: 1.7, marginBottom: 14 }}>
          App 廣告版位在 <strong>App Render（Native）</strong> 模式下，GAM 回傳結構化資料，由 App 自行組裝畫面。<br/>
          本工具基於 Google 官方 Native Template，讓設計師即時調整樣式、預覽效果、匯出 PNG 貼到 Figma 確認。
        </div>
        <CollapsibleSection title="可調整 vs 不可調整">
          <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
            <div style={{ flex: 1, minWidth: 140 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 6 }}>
                <div style={{ width: 12, height: 12, border: "2px solid #FF6B35", borderRadius: 2 }} />
                <span style={{ fontSize: 11, fontWeight: 600, color: "#FF6B35" }}>可調整（樣式）</span>
              </div>
              <ul style={{ margin: 0, paddingLeft: 18, fontSize: 11, color: "#555", lineHeight: 1.8 }}>
                <li>整體背景色</li><li>標題 — 字體、字級、字色、背景色</li><li>廣告主名稱 — 同上</li><li>描述文字 — 同上</li><li>CTA 按鈕 — 同上</li>
              </ul>
            </div>
            <div style={{ flex: 1, minWidth: 140 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 6 }}>
                <div style={{ width: 12, height: 12, background: "#e0e0e0", borderRadius: 2, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 6 }}>🔒</div>
                <span style={{ fontSize: 11, fontWeight: 600, color: "#999" }}>不可調整（結構）</span>
              </div>
              <ul style={{ margin: 0, paddingLeft: 18, fontSize: 11, color: "#999", lineHeight: 1.8 }}>
                <li>Media / Image 區域</li><li>Icon 位置</li><li>AdChoices 標記</li><li>元素排列順序</li>
              </ul>
            </div>
          </div>
          <div style={{ marginTop: 10, padding: "8px 10px", background: "#FFF8E1", borderRadius: 4, fontSize: 11, color: "#8D6E00", lineHeight: 1.6 }}>
            ⚠ 若需更改結構或排列，需走 Custom Rendering（非 Template）路線，開發成本較高。
          </div>
        </CollapsibleSection>
        <CollapsibleSection title="GAM 回傳欄位說明">
          <div style={{ fontSize: 11, color: "#444", lineHeight: 1.7 }}>
            <strong>必填欄位</strong>（一定會有）：標題 (Headline)、主圖 (Image)、CTA 按鈕<br/>
            <strong>選填欄位</strong>（可能為空）：描述文字 (Body)、廣告主名稱 / Icon、Star rating<br/>
            <span style={{ color: "#888" }}>→ 設計稿以全部欄位都有的狀態設計，另需標注「欄位為空時的處理方式」</span><br/>
            <span style={{ color: "#888" }}>→ 下方「欄位模擬」可切換選填欄位，預覽各種缺失狀態</span>
          </div>
        </CollapsibleSection>
      </div>

      {/* Template selector */}
      <div style={{ display: "flex", gap: 8, padding: "12px 20px", borderBottom: "1px solid #eee" }}>
        {Object.entries(TEMPLATES).map(([k, { label, description }]) => (
          <button key={k} onClick={() => setTemplate(k)}
            style={{ flex: 1, padding: "8px 12px", border: template === k ? "2px solid #2962FF" : "1px solid #ddd",
              borderRadius: 8, background: template === k ? "#EEF2FF" : "#fafafa", cursor: "pointer", textAlign: "left" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: template === k ? "#2962FF" : "#333" }}>{label}</div>
            <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>{description}</div>
          </button>
        ))}
      </div>

      {/* Image uploads */}
      <div style={{ padding: "10px 20px", borderBottom: "1px solid #eee" }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#555", marginBottom: 6 }}>素材上傳（模擬真實廣告畫面）</div>
        <ImageUpload label="主圖 Media" hint="不限尺寸，建議 1.91:1 或 1:1，≥1200px寬" accept="image/jpeg,image/png,image/gif,image/webp"
          currentUrl={mediaUrl} onUpload={setMediaUrl} onClear={() => setMediaUrl(null)} aspectHint="wide" />
        <ImageUpload label="Icon 圖示" hint="不限尺寸，建議 1:1 正方形，≥128px" accept="image/jpeg,image/png"
          currentUrl={iconUrl} onUpload={setIconUrl} onClear={() => setIconUrl(null)} aspectHint="square" />
      </div>

      {/* Field toggles */}
      <div style={{ padding: "12px 20px", borderBottom: "1px solid #eee" }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#555", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
          <span>欄位模擬</span>
          <span style={{ fontSize: 9, color: "#888", fontWeight: 400, background: "#f5f5f5", padding: "2px 6px", borderRadius: 3 }}>
            切換選填欄位，模擬 GAM 未提供該資料時的畫面
          </span>
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <ToggleChip label="標題" active={true} required={true} />
          <ToggleChip label="主圖" active={true} required={true} />
          <ToggleChip label="CTA" active={true} required={true} />
          {OPTIONAL_FIELDS.map(f => (
            <ToggleChip key={f.key} label={f.label} active={visibility[f.key]} onClick={() => toggleVis(f.key)} />
          ))}
        </div>
      </div>

      {/* Preview */}
      <div style={{ padding: "20px", display: "flex", flexDirection: "column", alignItems: "center", gap: 12,
        background: "repeating-conic-gradient(#f0f0f0 0% 25%, #fafafa 0% 50%) 50%/20px 20px",
        borderBottom: "1px solid #eee", minHeight: template === "medium" ? 340 : 140 }}>
        <div style={{ fontSize: 10, color: "#999", letterSpacing: 1, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 8 }}>
          <span>即時預覽 — {TEMPLATES[template].label}</span>
          {hasHidden && <span style={{ background: "#FFF3E0", color: "#E65100", padding: "2px 6px", borderRadius: 3, fontSize: 9, fontWeight: 600 }}>缺失欄位模擬中</span>}
        </div>
        <div ref={previewRef}>
          <Tmpl styles={styles} highlightZone={highlightZone} visibility={visibility} mediaUrl={mediaUrl} iconUrl={iconUrl} />
        </div>
      </div>

      {/* Export */}
      <div style={{ display: "flex", gap: 8, padding: "10px 20px", borderBottom: "1px solid #eee", alignItems: "center" }}>
        <button onClick={exportPNG}
          style={{ flex: 1, padding: "10px", background: "#2962FF", color: "#fff", border: "none", borderRadius: 6, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
          ⬇ 下載 PNG
        </button>
        <button onClick={exportJSON}
          style={{ flex: 1, padding: "10px", background: jsonCopied ? "#E8F5E9" : "#fff",
            color: jsonCopied ? "#2E7D32" : "#333", border: jsonCopied ? "1px solid #A5D6A7" : "1px solid #ddd",
            borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: "pointer", transition: "all 0.2s" }}>
          {jsonCopied ? "✓ 已複製" : "📋 複製 JSON"}
        </button>
        <button onClick={resetAll}
          style={{ padding: "10px 14px", background: "#fff", color: "#999", border: "1px solid #eee", borderRadius: 6, fontSize: 12, cursor: "pointer" }}>
          ↺ 重置
        </button>
      </div>
      {exportMsg && <div style={{ padding: "8px 20px", background: "#E8F5E9", color: "#2E7D32", fontSize: 12, fontWeight: 500, textAlign: "center" }}>{exportMsg}</div>}

      {/* Params */}
      <div>
        <div style={{ padding: "12px 20px 6px", fontSize: 11, color: "#999", letterSpacing: 1, textTransform: "uppercase" }}>
          參數調整（hover 群組可高亮預覽區域）
        </div>
        {PARAM_GROUPS.map(g => {
          const isExp = expandedGroup === g.key;
          const isHid = g.optionalFieldKey && !visibility[g.optionalFieldKey];
          return (
            <div key={g.key} style={{ borderBottom: "1px solid #f0f0f0", opacity: isHid ? 0.4 : 1, transition: "opacity 0.15s" }}
              onMouseEnter={() => !isHid && setHighlightZone(g.key)} onMouseLeave={() => setHighlightZone(null)}>
              <button onClick={() => !isHid && setExpandedGroup(isExp ? null : g.key)}
                style={{ width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "10px 20px",
                  border: "none", background: isExp && !isHid ? "#fafafa" : "transparent",
                  cursor: isHid ? "default" : "pointer", textAlign: "left" }}>
                <span style={{ width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center",
                  background: highlightZone === g.key && !isHid ? "#FF6B35" : "#f0f0f0",
                  color: highlightZone === g.key && !isHid ? "#fff" : "#666",
                  borderRadius: 6, fontSize: 11, fontWeight: 700, fontFamily: "system-ui" }}>{g.icon}</span>
                <span style={{ flex: 1, fontSize: 13, fontWeight: 500, color: isHid ? "#bbb" : "#333" }}>
                  {g.label}{isHid && <span style={{ fontSize: 10, color: "#ccc", marginLeft: 6 }}>(已隱藏)</span>}
                </span>
                <span style={{ fontSize: 12, color: "#ccc", transform: isExp && !isHid ? "rotate(90deg)" : "none", transition: "transform 0.15s" }}>▶</span>
              </button>
              {isExp && !isHid && (
                <div style={{ padding: "4px 20px 14px 56px" }}>
                  {g.params.map(p => (
                    <div key={p.key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, gap: 12 }}>
                      <label style={{ fontSize: 12, color: "#555", minWidth: 56, flexShrink: 0 }}>{p.label}</label>
                      {p.type === "color" && <ColorInput value={styles[p.key]} onChange={v => updateStyle(p.key, v)} />}
                      {p.type === "font" && (
                        <select value={styles[p.key]} onChange={e => updateStyle(p.key, e.target.value)}
                          style={{ fontSize: 12, padding: "4px 6px", border: "1px solid #d0d0d0", borderRadius: 4, background: "#fafafa", minWidth: 130 }}>
                          {FONT_OPTIONS.map(f => <option key={f} value={f}>{f}</option>)}
                        </select>
                      )}
                      {p.type === "number" && (
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="range" min={p.min} max={p.max} value={styles[p.key]}
                            onChange={e => updateStyle(p.key, Number(e.target.value))} style={{ width: 80 }} />
                          <span style={{ fontSize: 12, fontFamily: "monospace", color: "#666", minWidth: 24 }}>{styles[p.key]}</span>
                        </div>
                      )}
                      {p.type === "text" && (
                        <input type="text" value={styles[p.key]} onChange={e => updateStyle(p.key, e.target.value)}
                          style={{ fontSize: 12, padding: "4px 6px", border: "1px solid #d0d0d0", borderRadius: 4, background: "#fafafa", minWidth: 160, flex: 1 }} />
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Doc links */}
      <div style={{ padding: "14px 20px", background: "#f8f9fa", borderTop: "1px solid #eee" }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#888", marginBottom: 8 }}>官方參考文件</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {[
            { l: "📄 Template (Android)", u: "https://developers.google.com/ad-manager/mobile-ads-sdk/android/native/templates" },
            { l: "📄 Template (iOS)", u: "https://developers.google.com/ad-manager/mobile-ads-sdk/ios/native/templates" },
            { l: "📄 Custom Rendering", u: "https://developers.google.com/ad-manager/mobile-ads-sdk/android/native/advanced" },
            { l: "📄 Native + Banner", u: "https://developers.google.com/ad-manager/mobile-ads-sdk/android/native-banner" },
          ].map(({ l, u }) => (
            <a key={u} href={u} target="_blank" rel="noopener noreferrer"
              style={{ fontSize: 11, color: "#2962FF", textDecoration: "none", padding: "4px 10px", background: "#EEF2FF", borderRadius: 4, border: "1px solid #dce3f0" }}>{l}</a>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
