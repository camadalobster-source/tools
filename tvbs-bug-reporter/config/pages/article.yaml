# 文章頁 — AC 驗收標準
# 來源：ClickUp NS-2030 Web ① Article Page Layout-Part1

page_name: "文章頁"
test_url_pattern: "https://news-neo.tvbs-testing.com.tw/{category}/{id}"

sections:
  - name: "頁面響應式佈局"
    acs:
      - id: "AC-1.1.1"
        title: "頁首與頁尾 / Header and Footer"
        expected: "頁面最頂部應正確載入全站共用的 Header，最底部應正確載入 Footer"
      - id: "AC-1.1.2"
        title: "佈局斷點切換 / Breakpoint Layout Switching"
        expected: "桌面版 (≥1152px) 主要內容水平置中且有最大寬度限制；行動裝置版 (≤820px) 佔滿螢幕寬度"

  - name: "文章標頭區塊 (ArticleHeader)"
    acs:
      - id: "AC-1.2.1"
        title: "麵包屑 / Breadcrumb"
        expected: "應顯示文章所屬的分類路徑，且每一層級皆可點擊跳轉。有子分類：首頁 > 主分類 > 子分類；無子分類：首頁 > 主分類"
      - id: "AC-1.2.2"
        title: "文章標題 / Article Title"
        expected: "H1 字級，抓取長標題，最多可以顯示60中文字"
      - id: "AC-1.2.3"
        title: "發布與更新時間 / Publish and Update Time"
        expected: "Mobile 收合狀態：未修改只顯示發布時間，有修改只顯示最後更新時間。Desktop：未修改只顯示發布時間，有修改先顯示發布再顯示最後更新"
      - id: "AC-1.2.4"
        title: "作者資訊 / Author Information"
        expected: "應顯示所有 authors 陣列中的作者名稱，Follow 9 種角色排序"
      - id: "AC-1.2.6"
        title: "社群分享按鈕 / Social Share Buttons"
        expected: "Desktop Toolbar 上有 Facebook, Line, Thread；Mobile Navigation 上有 Line share"

  - name: "文章主圖 (Featured Image)"
    acs:
      - id: "AC-1.3.1"
        title: "圖片模式驗證 / Image Mode Verification"
        expected: "應正確顯示 16:9 寬度滿版的圖片。Mobile 最大 820px，Desktop 最大 772px。圖片下方應顯示 caption 與 copyright"
      - id: "AC-1.3.2"
        title: "影片模式驗證 / Video Mode Verification"
        expected: "主圖區塊直接顯示 YouTube 播放器，可正常播放與全螢幕"
      - id: "AC-1.3.4"
        title: "錯誤與降級處理 / Error and Fallback Handling"
        expected: "hero_image URL 失效時顯示預設佔位圖片；影片載入失敗時顯示預設佔位圖片"

  - name: "文章內文編輯器區塊 (Article Body)"
    acs:
      - id: "AC-1.4.1"
        title: "基本文字與段落樣式 / Basic Text and Paragraph Styles"
        expected: "h2、h3、p、ul、ol、a 等基本 HTML 標籤應具備正確的預設樣式。支援粗體、斜體、底線、連結、顏色、背景顏色、下標、上標"
      - id: "AC-1.4.2"
        title: "目錄 / Anchor"
        expected: "目錄元件只抓取其位置之後的 h2 標題來生成列表。點擊項目後頁面平滑滾動至對應 h2 位置"
      - id: "AC-1.4.3"
        title: "內文圖片 / Embedded Image"
        expected: "模式 1：16:9 容器置中；模式 2：寬度 100% 拉滿。支援 Logo 浮水印四角落。圖片下方有 caption 與 copyright"
      - id: "AC-1.4.5"
        title: "引述 / Quote"
        expected: "應以正確的引言樣式（縮排、直線、文字顏色）顯示文字內容"
      - id: "AC-1.4.6"
        title: "社群內容 / Social Media"
        expected: "應能正確嵌入並置中顯示 YouTube, Facebook, Instagram, X, Threads, TikTok。最大寬度 550px；手機高度限制 400px，桌機 500px。載入失敗時顯示連結卡片"
      - id: "AC-1.4.7"
        title: "內文嵌相關文章 / MoreNews"
        expected: "應能以固定的連結卡片樣式顯示相關文章的標題與連結"

  - name: "AIO/SEO 功能區塊"
    acs:
      - id: "AC-1.5.1"
        title: "內文引用 / Citation"
        expected: "有收合按鈕。收起時只出現引用標題；展開後顯示所有內容，至多 20 則"
      - id: "AC-1.5.2"
        title: "常見問答 / FAQ"
        expected: "h2 顯示標題 + p 描述；h3 顯示問題 + p 答案。最多 20 組"
      - id: "AC-1.5.3"
        title: "Hashtags"
        expected: "單行形式顯示，超過螢幕可左右滑動，至多 10 個"

  - name: "其他區塊"
    acs:
      - id: "AC-1.8.1"
        title: "Scroll to Top"
        expected: "Desktop 與 Mobile 按鈕固定於畫面右下角，永遠顯示，點擊後回到最頂端"
      - id: "AC-1.8.2"
        title: "字級調整功能 / Font Size Adjustment"
        expected: "僅調整內文段落文字大小。預設「小」(20px)，循環切換：小→中(22px)→大(24px)。桌面版有三個獨立按鈕"
      - id: "AC-1.8.3"
        title: "桌面版置底工具列 / Desktop Floating Toolbar"
        expected: "僅在桌面版 (≥1152px) 顯示，分享與字級調整功能正常運作"
      - id: "AC-1.8.4"
        title: "18禁內容警告 / Adult Content Warning"
        expected: "Modal 提供「已滿18歲」（關閉 Modal）與「未滿18歲」（導向首頁）兩個按鈕"
